<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERITAGE THREAD | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="https://i.ibb.co/zHxdw3YX/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="assets/js/emailjs-config.js"></script>
  <script src="assets/js/sheets-config.js"></script>
  <script src="assets/js/data.js"></script>
</head>
<body>
<section class="auth-wrap">
  <div class="auth-card">
    <p class="eyebrow">Reset Password</p>
    <h2 class="auth-title">Enter code and new password.</h2>
    <form id="resetForm" class="form-grid">
      <input class="field" id="resetEmail" type="email" placeholder="Email address">
      <input class="field" id="resetCode" type="text" placeholder="Reset code" required>
      <div class="form-grid two">
        <input class="field" id="newPassword" type="password" placeholder="New Password" required>
        <input class="field" id="confirmNewPassword" type="password" placeholder="Confirm New Password" required>
      </div>
      <button class="btn btn-dark" type="submit">Update Password</button>
      <button class="btn btn-light" type="button" onclick="resendResetCode()">Resend Reset Code</button>
    </form>
    <p class="form-note"><a href="login.html">Back to Login</a></p>
  </div>
</section>
<script src="assets/js/email-service.js"></script>
<script src="assets/js/auth.js"></script>
<script>(async()=>{await bootAuthUi();})();</script>
</body>
</html>
